host: localhost:8080
info:
  contact:
    email: support@bagsies.com
    name: API Support
  description: API для приложения Bagsy
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Bagsy API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Выполняет авторизацию пользователя по номеру телефона и паролю
      parameters:
      - description: Данные для авторизации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешная авторизация
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.loginResponse'
        "400":
          description: Неверные данные
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Неверный логин или пароль
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Авторизация пользователя
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Выполняет выход пользователя из системы и инвалидирует refresh
        token
      parameters:
      - description: Refresh token для выхода
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.refreshTokensRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный выход
        "400":
          description: Неверные данные
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Выход из системы
      tags:
      - auth
  /api/v1/auth/management/register:
    post:
      consumes:
      - application/json
      description: |-
        Запускает двухэтапный процесс регистрации владельца сети или сетевого менеджера: создает сеть и отправляет 4-значный код подтверждения на телефон (SMS/WhatsApp). Пользователь завершит регистрацию через /api/v1/auth/management/register/confirm, введя код из SMS.

        Роли для регистрации:
        - net_manager: Менеджер сети (управляет точками)
        - self_owner: Владелец-самозанятый (управляет своей сетью)

        После успешной регистрации код действителен 5 минут. На ввод кода даётся 3 попытки.
      parameters:
      - description: 'Данные для регистрации (name, surname, phone, password, role:
          net_manager|self_owner, network_info)'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.registerManagementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Код подтверждения отправлен на телефон
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверный формат запроса или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "409":
          description: Пользователь с таким номером уже существует
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Инициация регистрации менеджмента (шаг 1/2)
      tags:
      - auth
  /api/v1/auth/management/register/confirm:
    post:
      consumes:
      - application/json
      description: |-
        Завершает двухэтапную регистрацию владельца сети или сетевого менеджера: проверяет 6-значный код из SMS, создает пользователя и сеть в БД, активирует пользователя и возвращает пару токенов (access/refresh) для дальнейшей авторизации.

        Важно:
        - Код действителен 5 минут после отправки
        - Даётся максимум 3 попытки ввода кода
        - После 3 неудачных попыток данные регистрации удаляются, нужно начать заново
        - Каждая неудачная попытка возвращает количество оставшихся попыток в поле attempts_remaining
      parameters:
      - description: Данные для подтверждения (phone, code)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.registerManagementConfirmRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Регистрация успешно завершена, пользователь и сеть созданы
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.registerConfirmResponse'
        "400":
          description: Неверный формат данных, валидация или неверный код подтверждения
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "403":
          description: Превышен лимит попыток ввода кода (3 попытки)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Код истёк или не найден (истекло 10 минут)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Завершение регистрации менеджмента (шаг 2/2)
      tags:
      - auth
  /api/v1/auth/management/register/resend:
    post:
      consumes:
      - application/json
      description: |-
        Отправляет новый 4-значный код подтверждения на телефон пользователя, который уже начал регистрацию менеджмента через /api/v1/auth/management/register. Сбрасывает счетчик неудачных попыток ввода кода (даёт еще 3 попытки). Данные регистрации (имя, пароль, роль, сеть) НЕ изменяются.

        Ограничения безопасности:
        - Между запросами resend должно пройти минимум 60 секунд (cooldown)
        - Максимум 5 повторных отправок в час на один номер
        - Код действителен 10 минут с момента отправки
        - После 3 неудачных попыток ввода кода нужно запросить новый через resend

        Use Case: Пользователь начал регистрацию, но код не пришел или истек
      parameters:
      - description: Номер телефона
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.resendRegisterManagementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Новый код подтверждения отправлен
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверный формат данных или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Регистрация не найдена или истекла (нужно начать заново через
            /register)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "429":
          description: Слишком частые запросы - подождите 60 секунд или превышен лимит
            (5/час)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Повторная отправка кода подтверждения регистрации
      tags:
      - auth
  /api/v1/auth/password/change:
    post:
      consumes:
      - application/json
      description: |-
        Отправляет ссылку для сброса пароля на номер телефона пользователя. Ссылка содержит one-time токен, действительный 1 час. Используется когда пользователь забыл пароль и хочет установить новый.

        Важно:
        - Пользователь с указанным номером должен существовать в системе
        - Ссылка отправляется через WhatsApp с fallback на SMS
        - Токен можно использовать только один раз
        - После получения ссылки используйте /api/v1/auth/password/confirm для установки нового пароля
      parameters:
      - description: Номер телефона пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Ссылка для сброса пароля отправлена
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверный формат данных или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Пользователь с таким номером не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Запрос на сброс пароля (шаг 1/2)
      tags:
      - auth
  /api/v1/auth/password/change/confirm:
    post:
      consumes:
      - application/json
      description: |-
        Завершает процесс сброса пароля: проверяет one-time токен из ссылки и устанавливает новый пароль пользователю. После успешной смены пароля все активные сессии (refresh токены) инвалидируются для безопасности.

        Важно:
        - Токен можно использовать только один раз (one-time use)
        - При повторной попытке использования возвращается ошибка 409 Conflict
        - После смены пароля пользователь должен войти заново (фронт сделать logout) (старые токены недействительны)
        - Токен действителен 24 часа с момента запроса
      parameters:
      - description: Токен и новый пароль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.passwordChangeConfirmRequest'
      produces:
      - application/json
      responses:
        "200":
