host: localhost:8080
info:
  contact:
    email: support@bagsies.com
    name: API Support
  description: API для приложения Bagsy
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Bagsy API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Аутентификация сотрудника по номеру телефона и паролю. Возвращает
        пару JWT-токенов (access + refresh).
      parameters:
      - description: Телефон и пароль
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Неверный телефон или пароль
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Вход сотрудника
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Инвалидирует refresh-токен. Access-токен продолжает действовать
        до истечения TTL.
      parameters:
      - description: Refresh-токен для инвалидации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.logoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Токен успешно инвалидирован
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Выход из системы
      tags:
      - auth
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Отправляет ссылку для сброса пароля на номер телефона сотрудника
        через WhatsApp (с fallback на SMS).
      parameters:
      - description: Номер телефона
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.requestResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "403":
          description: Аккаунт неактивен
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: Сотрудник не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Запрос на сброс пароля (шаг 1/2)
      tags:
      - auth
  /api/v1/auth/password/reset/confirm:
    post:
      consumes:
      - application/json
      description: Проверяет one-time токен и устанавливает новый пароль. Все активные
        сессии инвалидируются.
      parameters:
      - description: Токен и новый пароль
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.confirmResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Токен не найден или истёк
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Подтверждение сброса пароля (шаг 2/2)
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Принимает refresh-токен, ротирует его и возвращает новую пару access
        + refresh токенов.
      parameters:
      - description: Refresh-токен
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.tokensResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Токен не найден или истёк
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Обновление токенов
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Начинает процесс регистрации владельца организации. Создаёт pending-запрос
        и отправляет OTP-код на указанный номер телефона.
      parameters:
      - description: Данные регистрации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.registerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "409":
          description: Пользователь с таким номером уже существует
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Регистрация владельца
      tags:
      - auth
  /api/v1/auth/register/resend:
    post:
      consumes:
      - application/json
      description: Повторно отправляет OTP-код на телефон. Доступно только если прошёл
        retry_after интервал с предыдущей отправки.
      parameters:
      - description: Номер телефона
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.resendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.resendResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: Pending-запрос не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "429":
          description: Слишком рано для повторной отправки
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Повторная отправка OTP
      tags:
      - auth
  /api/v1/auth/register/verify:
    post:
      consumes:
      - application/json
      description: Подтверждает регистрацию владельца OTP-кодом. При успехе создаёт
        организацию, сотрудника, подписку и возвращает JWT-токены.
      parameters:
      - description: Телефон и OTP-код
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.verifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.tokensResponse'
        "400":
          description: Неверный код или истёк срок действия
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: Pending-запрос не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      summary: Подтверждение регистрации
      tags:
      - auth
  /api/v1/auth/verify/{token}:
    get:
      description: Возвращает метаданные токена (телефон, назначение, опциональные
        org/location ID) для отображения на фронтенде. Используется для приглашений
        и сброса пароля. Не требует авторизации.
      parameters:
      - description: Action-токен
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.verifyActionTokenResponse'
        "400":
          description: Пустой токен
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: Токен не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
