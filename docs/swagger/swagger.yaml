  /api/v1/media/upload:
    post:
      consumes:
      - application/json
      description: |-
        Создаёт запись о медиафайле и возвращает presigned POST URL для загрузки в S3.
        Допустимые значения purpose: avatars, organizations, locations, services, service-categories.
      parameters:
