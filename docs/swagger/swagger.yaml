      description: |-
        Возвращает список сотрудников организации с пагинацией и фильтрацией.
        Owner — все сотрудники организации. Manager — только сотрудники своей локации. Staff — доступ запрещён (403).
      parameters:
      - description: UUID локации для фильтрации
        in: query
        name: location_id
        type: string
      - collectionFormat: multi
        description: Фильтр по ролям (multi-value)
        in: query
        items:
          enum:
          - owner
          - manager
          - staff
          type: string
        name: role
        type: array
      - description: Поиск по номеру телефона (ILIKE)
        in: query
        name: phone_search
        type: string
      - description: Фильтр по активности
        in: query
        name: active
        type: boolean
      - description: 'Количество записей (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Смещение для пагинации (default: 0)'
        in: query
        name: offset
        type: integer
      - default: created_at
        description: Поле сортировки
        enum:
        - created_at
        - first_name
        - phone
        - role
        in: query
        name: order_by
        type: string
      - default: desc
