      - employees
    put:
      consumes:
      - application/json
      description: Позволяет сотруднику обновить своё имя, фамилию и аватар.
      parameters:
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_employee.updateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_employee.getMeResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: employee_not_found
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "410":
          description: employee_deleted
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Обновление своего профиля
      tags:
      - employees
  /api/v1/locations:
    get:
      description: Возвращает список локаций организации с пагинацией и фильтрацией.
        Только Owner.
      parameters:
      - description: Фильтр по активности
        in: query
        name: active
        type: boolean
      - description: 'Количество записей (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Смещение для пагинации (default: 0)'
        in: query
        name: offset
        type: integer
      - default: created_at
        description: Поле сортировки
        enum:
        - created_at
        - name
        in: query
        name: order_by
        type: string
      - default: desc
        description: Направление сортировки
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_location.getListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Получение списка локаций
      tags:
      - locations
    post:
      consumes:
      - application/json
      description: Создаёт новую точку обслуживания для организации. Проверяет лимиты
        тарифного плана.
      parameters:
      - description: Данные локации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_location.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_location.createResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "403":
          description: Лимит превышен или подписка приостановлена
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Создание локации
      tags:
      - locations
  /api/v1/locations/{id}:
