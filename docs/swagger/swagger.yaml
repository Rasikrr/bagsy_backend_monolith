      produces:
      - application/json
      responses:
        "200":
          description: Ссылка для завершения регистрации отправлена
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверный формат запроса или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Требуется авторизация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "403":
          description: Недостаточно прав (Staff не может создавать, Manager только
            в своей точке)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "409":
          description: Пользователь уже существует
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Инициация регистрации работника (шаг 1/2)
      tags:
      - auth
  /api/v1/auth/staff/register/confirm:
    post:
      consumes:
      - application/json
      description: |-
        Завершает двухэтапную регистрацию работника: проверяет one-time токен из ссылки, устанавливает имя, фамилию и пароль, активирует пользователя и возвращает пару токенов (access/refresh) для дальнейшей авторизации.

        Важно: токен можно использовать только один раз (one-time use). При повторной попытке использования возвращается ошибка 409 Conflict.
      parameters:
      - description: Данные для завершения (token, name, surname, password)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.registerConfirmRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Регистрация успешно завершена, пользователь активирован
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.registerConfirmResponse'
        "400":
          description: Неверный формат данных или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Неверный или просроченный токен
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "409":
          description: Токен уже использован или пользователь уже активирован
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Завершение регистрации работника (шаг 2/2)
      tags:
      - auth
  /api/v1/auth/staff/register/resend:
    post:
      consumes:
      - application/json
      description: |-
        Отправляет новую ссылку для завершения регистрации работнику, которого менеджер уже зарегистрировал через /api/v1/auth/staff/register. Ссылка содержит one-time токен и отправляется через WhatsApp с fallback на SMS. Данные регистрации (имя, фамилия, роль, точка) НЕ изменяются.

        Права доступа:
        - Manager: может отправить повторно только для работников своей точки
        - NetManager/SelfOwner: могут отправить для любого работника своей сети
        - Staff: не может использовать этот endpoint

        Ограничения безопасности:
        - Требуется авторизация (Manager+)
        - Работник должен быть предварительно создан через /staff/register
        - Токен действителен 24 часа с момента отправки
        - Максимум 10 повторных отправок в час (rate limiting)

        Use Case: Работник не получил первую ссылку или она истекла
      parameters:
      - description: Номер телефона работника
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_auth.registerStaffResendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Новая ссылка для регистрации отправлена
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверный формат данных или валидация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Требуется авторизация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "403":
          description: Недостаточно прав (работник не в вашей точке/сети)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Регистрация работника не найдена (нужно создать через /register)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "429":
          description: Превышен лимит повторных отправок (10/час)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Повторная отправка ссылки для регистрации работника
      tags:
      - auth
  /api/v1/auth/verify-auth-token/{token}:
    get:
      consumes:
      - application/json
      description: |-
        Позволяет фронтенду проверить валидность короткого токена из ссылки и получить метаданные (телефон, название точки/сети) для отображения пользователю.
        Метод является Read-only: он НЕ удаляет токен из кэша и НЕ завершает процесс регистрации/смены пароля.

        Поддерживаемые типы токенов (поле type):
        - `registration`: Инвайт нового сотрудника. Возвращает имя, роль и название точки.
        - `password_reset`: Ссылка на восстановление пароля. Возвращает только номер телефона.

        Логика работы:
        1. Проверяет наличие токена в Redis.
        2. Если тип "registration", обогащает ответ данными из кэша заявок и справочника точек.
        3. Если токен просрочен или не существует — возвращает 401.

        Use Case: Пользователь кликнул по ссылке из WhatsApp/SMS, фронтенд запрашивает данные, чтобы отобразить под каким номер проходит процесс
      parameters:
      - description: Короткий токен из ссылки (10 символов)
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Данные о токене и владельце
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_auth.verifyAuthTokenResponse'
        "401":
          description: Токен недействителен, истек или уже был использован
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Токен не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Проверка токена регистрации или сброса пароля
      tags:
      - auth
