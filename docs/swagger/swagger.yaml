      - application/json
      description: Генерирует новый токен и повторно отправляет ссылку для регистрации.
        Требует авторизации. Действует cooldown 60 секунд между отправками.
      parameters:
      - description: Номер телефона приглашённого
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_employee.resendInviteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_employee.resendInviteResponse'
        "400":
          description: Невалидный телефон
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "403":
          description: Нет прав (другая организация)
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "404":
          description: Приглашение не найдено
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "429":
          description: Cooldown ещё не прошёл
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_util.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Переотправить приглашение
      tags:
      - employees
  /api/v1/employees/me:
    get:
      description: Возвращает информацию о текущем авторизованном сотруднике.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_employee.getMeResponse'
        "401":
          description: Unauthorized
