  /api/v1/auth/staff/register:
    post:
      consumes:
      - application/json
      description: |-
        Запускает двухэтапный процесс регистрации работника: создает неактивного пользователя и отправляет ссылку для завершения регистрации (WhatsApp с fallback на SMS). Пользователь завершит регистрацию через /api/v1/auth/staff/confirm с указанием имени, фамилии и пароля.

        Иерархия прав:
        - Staff: не может создавать пользователей
        - Manager: может создавать только Staff в своей точке
        - NetManager/SelfOwner: могут создавать Manager и Staff в любой точке своей сети
      parameters:
      - description: 'Данные для регистрации (phone, role: manager|staff, point_code)'
        in: body
        name: request
        required: true
