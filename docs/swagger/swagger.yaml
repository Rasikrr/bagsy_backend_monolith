          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Создать точку обслуживания
      tags:
      - points
  /api/v1/points/{code}:
    get:
      consumes:
      - application/json
      description: Возвращает информацию о точке обслуживания по её коду
      parameters:
      - description: Код точки обслуживания
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Информация о точке
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_dto.PointResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Пользователь не авторизован
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "403":
          description: Недостаточно прав для доступа
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Точка не найдена
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      summary: Получить точку обслуживания
      tags:
      - points
  /api/v1/staff:
    get:
      consumes:
      - application/json
      description: |-
        Возвращает список пользователей с offset-based пагинацией и учетом прав доступа.
        - NetManager/SelfOwner: пользователи только своей сети
        - Manager: пользователи только своей точки
        - Staff/User: доступ запрещен (403)
      parameters:
      - description: Код точки для фильтрации
        in: query
        name: point_code
        type: string
      - description: Код сети для фильтрации
        in: query
        name: network_code
        type: string
      - collectionFormat: multi
        description: Фильтр по ролям
        in: query
        items:
          enum:
          - staff
          - manager
          - net_manager
          - self_owner
          type: string
        name: role
        type: array
      - collectionFormat: multi
        description: Фильтр по номерам телефонов
        in: query
        items:
          type: string
        name: phone
        type: array
      - description: 'Количество записей на странице (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Смещение для пагинации (default: 0)'
        in: query
        name: offset
        type: integer
      - default: created_at
        description: Поле для сортировки
        enum:
        - phone
        - name
        - surname
        - point_code
        - network_code
        - created_at
        - updated_at
        in: query
        name: order_by
        type: string
      - default: asc
        description: Направление сортировки
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Список пользователей с пагинацией
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_users.getUsersResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Пользователь не авторизован
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "403":
          description: Недостаточно прав для доступа к ресурсу
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Получить список пользователей
      tags:
      - users
  /api/v1/users/me:
    get:
      consumes:
      - application/json
      description: 'Возвращает детальную информацию о текущем авторизованном пользователе:
        телефон, роль, имя, фамилия, привязанная точка и сеть, статус активности,
        расписание работы (для staff) и даты создания/обновления.'
      produces:
      - application/json
      responses:
        "200":
          description: Профиль пользователя
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_users.userDTO'
        "401":
          description: Требуется авторизация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Получение профиля текущего пользователя
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Позволяет пользователю обновить своё имя и фамилию
      parameters:
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_users.updateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Обновлённый профиль пользователя
          schema:
            $ref: '#/definitions/internal_ports_http_handlers_users.userDTO'
        "400":
          description: Неверные параметры запроса
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Требуется авторизация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Обновление своего профиля
      tags:
      - users
  /api/v1/users/me/schedule:
    put:
      consumes:
      - application/json
      description: Позволяет обновить расписание работы (7 дней). Время передается
        в формате Almaty timezone и конвертируется в UTC
      parameters:
      - description: Расписание на 7 дней
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_ports_http_handlers_users.updateScheduleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Расписание обновлено
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_response.EmptySuccessResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "401":
          description: Требуется авторизация
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github_com_Rasikrr_bagsy_backend_monolith_internal_ports_http_errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Обновление расписания пользователя
      tags:
      - users
